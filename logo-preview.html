<!DOCTYPE html>
<html>
<head>
  <title>Cooked Guy Logo Preview</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #1a1a2e;
      color: white;
      padding: 40px;
      text-align: center;
    }
    .preview {
      display: inline-block;
      margin: 20px;
      padding: 20px;
      background: #16213e;
      border-radius: 16px;
    }
    .preview img {
      display: block;
      margin: 0 auto 10px;
    }
    .preview p {
      margin: 5px 0;
      opacity: 0.7;
      font-size: 14px;
    }
    h1 { color: #FFE66D; }
    .dark-bg { background: #0d0d0d; }
    .light-bg { background: #f5f5f5; }
  </style>
</head>
<body>
  <h1>🔥 Cooked Guy Logo Preview</h1>
  
  <div class="preview">
    <img src="public/logo-cooked-guy.svg" width="200" height="200">
    <p>Full Logo (200px)</p>
  </div>
  
  <div class="preview">
    <img src="public/logo-cooked-guy.svg" width="100" height="100">
    <p>Medium (100px)</p>
  </div>
  
  <div class="preview">
    <img src="public/favicon-cooked.svg" width="64" height="64">
    <p>Favicon (64px)</p>
  </div>
  
  <div class="preview">
    <img src="public/favicon-cooked.svg" width="32" height="32">
    <p>Favicon (32px)</p>
  </div>
  
  <div class="preview">
    <img src="public/favicon-cooked.svg" width="16" height="16">
    <p>Favicon (16px)</p>
  </div>

  <h2>On Different Backgrounds</h2>
  
  <div class="preview dark-bg">
    <img src="public/logo-cooked-guy.svg" width="120" height="120">
    <p>Dark BG</p>
  </div>
  
  <div class="preview light-bg">
    <img src="public/logo-cooked-guy.svg" width="120" height="120">
    <p>Light BG</p>
  </div>
</body>
</html>
