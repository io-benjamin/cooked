<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Am I Cooked? — Results</title>
  
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'General Sans', sans-serif; }
    .font-display { font-family: 'Satoshi', sans-serif; }
    
    :root {
      --accent: #F43F5E;
      --accent-light: #FB7185;
    }
    
    body {
      background: #09090B;
    }
    
    /* Subtle radial glow */
    .glow {
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(244,63,94,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    
    /* Score styling */
    .score {
      background: linear-gradient(180deg, #FFFFFF 0%, rgba(255,255,255,0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    /* Tier badge */
    .tier-badge {
      background: linear-gradient(135deg, rgba(244,63,94,0.15) 0%, rgba(244,63,94,0.05) 100%);
      border: 1px solid rgba(244,63,94,0.2);
    }
    
    /* Issue card */
    .issue-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
      border: 1px solid rgba(255,255,255,0.06);
    }
    
    /* CTA button */
    .btn-cta {
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(244,63,94,0);
      transition: all 0.3s ease;
    }
    .btn-cta:hover {
      box-shadow: 0 8px 40px rgba(244,63,94,0.3);
      transform: translateY(-2px);
    }
    
    /* Animations */
    @keyframes countUp {
      from { 
        opacity: 0;
        transform: translateY(20px);
      }
      to { 
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-count {
      animation: countUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    .animate-fade {
      animation: fadeIn 0.6s ease forwards;
      opacity: 0;
    }
    
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    
    /* Heat indicator bar */
    .heat-bar {
      background: linear-gradient(90deg, 
        #22C55E 0%, 
        #84CC16 20%, 
        #FACC15 40%, 
        #F97316 60%, 
        #EF4444 80%, 
        #991B1B 100%
      );
    }
    
    .heat-marker {
      transition: left 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
  </style>
</head>
<body class="text-white antialiased min-h-screen">
  
  <div class="glow"></div>
  
  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 z-50 px-6 py-5">
    <div class="max-w-xl mx-auto flex items-center justify-between">
      <a href="/" class="font-display font-bold text-white/50 hover:text-white transition-colors">
        am i cooked?
      </a>
      <button class="flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10 text-sm text-white/60 hover:text-white hover:bg-white/10 transition-all">
        <svg class="w-4 h-4" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Save results
      </button>
    </div>
  </header>
  
  <!-- Main Content -->
  <main class="min-h-screen flex flex-col items-center justify-center px-6 pt-24 pb-16">
    
    <div class="max-w-xl w-full">
      
      <!-- Score Section -->
      <div class="text-center mb-10">
        <div class="animate-count font-display font-black text-[160px] leading-none tracking-tight score">
          73
        </div>
        
        <!-- Tier -->
        <div class="animate-fade delay-1 flex justify-center mt-4">
          <div class="tier-badge flex items-center gap-2.5 px-5 py-2.5 rounded-full">
            <span class="text-lg">🔥</span>
            <span class="font-display font-bold text-sm uppercase tracking-wider text-[var(--accent)]">Sautéed</span>
          </div>
        </div>
      </div>
      
      <!-- Heat Bar -->
      <div class="animate-fade delay-2 mb-12 px-4">
        <div class="relative">
          <div class="heat-bar h-2 rounded-full"></div>
          <div class="heat-marker absolute top-1/2 -translate-y-1/2 w-4 h-4 bg-white rounded-full shadow-lg border-2 border-white" style="left: 73%;">
          </div>
        </div>
        <div class="flex justify-between mt-2 text-xs text-white/30">
          <span>Raw</span>
          <span>Charred</span>
        </div>
      </div>
      
      <!-- Top Issue Card -->
      <div class="animate-fade delay-3 issue-card rounded-2xl p-6 mb-8">
        <div class="flex items-start gap-4">
          <div class="w-10 h-10 rounded-xl bg-red-500/10 flex items-center justify-center flex-shrink-0">
            <span class="text-lg">🏠</span>
          </div>
          <div class="flex-1">
            <span class="text-xs text-white/40 uppercase tracking-wider">Top Issue</span>
            <h2 class="font-display text-xl font-bold mt-1 mb-2">
              Rent is 52% of your income
            </h2>
            <p class="text-white/40 text-sm leading-relaxed">
              That's 22% over the recommended maximum. This is the biggest factor affecting your score.
            </p>
          </div>
        </div>
      </div>
      
      <!-- CTA -->
      <div class="animate-fade delay-4 text-center">
        <button class="btn-cta w-full py-4 rounded-2xl font-display font-bold text-base text-white">
          Get Full Report — $5
        </button>
        <p class="mt-4 text-white/25 text-sm">
          Includes detailed breakdown & personalized action plan
        </p>
      </div>
      
    </div>
    
  </main>
  
  <!-- Footer -->
  <footer class="fixed bottom-0 left-0 right-0 py-4">
    <p class="text-center text-xs text-white/15">For entertainment purposes only. Not financial advice.</p>
  </footer>
  
</body>
</html>
