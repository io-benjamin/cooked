<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Am I Cooked?</title>
  
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'General Sans', sans-serif; }
    .font-display { font-family: 'Satoshi', sans-serif; }
    
    body {
      background: #030305;
      overflow-x: hidden;
    }
    
    /* Dramatic light beam from score */
    .light-beam {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200%;
      height: 300px;
      transform: translate(-50%, -50%);
      background: radial-gradient(ellipse at center, 
        rgba(239,68,68,0.15) 0%, 
        rgba(239,68,68,0.05) 30%,
        transparent 70%);
      animation: pulse 4s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }
    
    /* Score container with glow */
    .score-wrapper {
      position: relative;
      display: inline-block;
    }
    
    .score-wrapper::before {
      content: '';
      position: absolute;
      inset: -40px;
      background: radial-gradient(circle, rgba(239,68,68,0.3) 0%, transparent 70%);
      filter: blur(40px);
      animation: glowPulse 3s ease-in-out infinite;
    }
    
    @keyframes glowPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.8; }
    }
    
    /* The score number */
    .score-number {
      font-size: clamp(120px, 30vw, 220px);
      font-weight: 900;
      line-height: 0.85;
      letter-spacing: -0.03em;
      background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.6) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
      z-index: 2;
    }
    
    /* Tier with dramatic styling */
    .tier-label {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      background: linear-gradient(135deg, rgba(239,68,68,0.2) 0%, rgba(239,68,68,0.05) 100%);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 100px;
      position: relative;
      overflow: hidden;
    }
    
    .tier-label::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transform: translateX(-100%);
      animation: shimmer 3s infinite;
    }
    
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }
    
    /* Issue card with depth */
    .issue-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }
    
    .issue-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(239,68,68,0.5), transparent);
    }
    
    /* CTA with energy */
    .cta-button {
      position: relative;
      background: #EF4444;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .cta-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%, rgba(255,255,255,0.1) 100%);
    }
    
    .cta-button::after {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(135deg, #EF4444, #DC2626, #EF4444);
      border-radius: inherit;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.4s;
    }
    
    .cta-button:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 
        0 20px 50px rgba(239,68,68,0.4),
        0 0 0 1px rgba(239,68,68,0.5);
    }
    
    .cta-button:hover::after {
      opacity: 1;
    }
    
    /* Animated background particles */
    .particle {
      position: fixed;
      width: 4px;
      height: 4px;
      background: rgba(239,68,68,0.3);
      border-radius: 50%;
      animation: float 15s infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }
    
    /* Stagger animations */
    @keyframes revealUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes revealScale {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .reveal-up { animation: revealUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; opacity: 0; }
    .reveal-scale { animation: revealScale 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; opacity: 0; }
    
    .d1 { animation-delay: 0.1s; }
    .d2 { animation-delay: 0.3s; }
    .d3 { animation-delay: 0.5s; }
    .d4 { animation-delay: 0.7s; }
  </style>
</head>
<body class="text-white antialiased min-h-screen flex flex-col">
  
  <!-- Floating particles -->
  <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
  <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
  <div class="particle" style="left: 40%; animation-delay: 4s;"></div>
  <div class="particle" style="left: 60%; animation-delay: 1s;"></div>
  <div class="particle" style="left: 80%; animation-delay: 3s;"></div>
  <div class="particle" style="left: 90%; animation-delay: 5s;"></div>
  
  <!-- Header -->
  <header class="relative z-50 px-6 py-5">
    <div class="max-w-xl mx-auto flex items-center justify-between">
      <a href="/" class="font-display font-bold text-white/40 hover:text-white transition-colors">
        am i cooked?
      </a>
      <button class="flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10 text-sm text-white/50 hover:text-white hover:bg-white/10 transition-all">
        Save results
      </button>
    </div>
  </header>
  
  <!-- Main -->
  <main class="flex-1 flex flex-col items-center justify-center px-6 relative">
    
    <!-- Light beam effect -->
    <div class="light-beam"></div>
    
    <div class="relative z-10 max-w-lg w-full text-center">
      
      <!-- The Score -->
      <div class="reveal-scale d1 score-wrapper mb-6">
        <div class="score-number font-display">73</div>
      </div>
      
      <!-- Tier -->
      <div class="reveal-up d2 flex justify-center mb-12">
        <div class="tier-label">
          <span class="text-2xl">🔥</span>
          <span class="font-display font-bold text-lg uppercase tracking-wider text-red-400">Sautéed</span>
        </div>
      </div>
      
      <!-- Issue Card -->
      <div class="reveal-up d3 issue-card rounded-2xl p-6 mb-8 text-left">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
          <span class="text-xs uppercase tracking-widest text-white/40">Primary Issue</span>
        </div>
        <h2 class="font-display text-xl font-bold mb-2">
          52% of income goes to rent
        </h2>
        <p class="text-white/40 text-sm">
          That's $800/month over the recommended limit for your salary.
        </p>
      </div>
      
      <!-- CTA -->
      <div class="reveal-up d4">
        <button class="cta-button w-full py-5 rounded-2xl font-display font-bold text-lg text-white">
          Get Full Report — $5
        </button>
        <p class="mt-4 text-white/25 text-xs">
          AI-powered analysis • Personalized action plan
        </p>
      </div>
      
    </div>
    
  </main>
  
  <!-- Footer -->
  <footer class="relative z-10 py-4">
    <p class="text-center text-[10px] text-white/10">For entertainment purposes only</p>
  </footer>
  
</body>
</html>
