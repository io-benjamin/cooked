<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Am I Cooked?</title>
  
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'General Sans', sans-serif; }
    .font-display { font-family: 'Satoshi', sans-serif; }
    
    body {
      background: #08080A;
      overflow-x: hidden;
    }
    
    /* Split diagonal background */
    .split-bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #08080A 50%, #0F0F12 50%);
    }
    
    /* Score reveal animation */
    @keyframes revealScore {
      0% { 
        clip-path: inset(0 100% 0 0);
        opacity: 0;
      }
      100% { 
        clip-path: inset(0 0 0 0);
        opacity: 1;
      }
    }
    
    .score-reveal {
      animation: revealScore 1.2s cubic-bezier(0.65, 0, 0.35, 1) forwards;
      animation-delay: 0.3s;
      opacity: 0;
    }
    
    /* Line draw animation */
    @keyframes drawLine {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }
    
    .line-draw {
      transform-origin: left;
      animation: drawLine 0.8s cubic-bezier(0.65, 0, 0.35, 1) forwards;
      animation-delay: 1s;
      transform: scaleX(0);
    }
    
    /* Text slide */
    @keyframes slideIn {
      from { 
        opacity: 0;
        transform: translateX(-40px);
      }
      to { 
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    .slide-in {
      animation: slideIn 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      opacity: 0;
    }
    
    .delay-1 { animation-delay: 1.3s; }
    .delay-2 { animation-delay: 1.5s; }
    .delay-3 { animation-delay: 1.7s; }
    
    /* Vertical text */
    .vertical-text {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
    }
    
    /* Accent line */
    .accent-line {
      background: linear-gradient(90deg, #E11D48, #F43F5E, transparent);
    }
    
    /* Button */
    .btn {
      position: relative;
      overflow: hidden;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      transition: all 0.4s ease;
    }
    
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #E11D48, #F43F5E);
      transform: translateX(-100%);
      transition: transform 0.4s ease;
    }
    
    .btn:hover {
      border-color: transparent;
    }
    
    .btn:hover::before {
      transform: translateX(0);
    }
    
    .btn span {
      position: relative;
      z-index: 1;
    }
    
    /* Noise texture */
    .noise {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
    }
  </style>
</head>
<body class="text-white antialiased min-h-screen">
  
  <div class="split-bg"></div>
  <div class="noise"></div>
  
  <!-- Sign up - top right, minimal -->
  <div class="fixed top-6 right-6 z-50">
    <button class="flex items-center gap-2 text-sm text-white/40 hover:text-white transition-colors">
      <span>Save</span>
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
      </svg>
    </button>
  </div>
  
  <!-- Main layout -->
  <main class="relative z-10 min-h-screen flex">
    
    <!-- Left side - Score -->
    <div class="w-1/2 min-h-screen flex items-center justify-end pr-16 relative">
      
      <!-- Vertical label -->
      <div class="absolute left-8 top-1/2 -translate-y-1/2">
        <span class="vertical-text text-xs tracking-[0.3em] text-white/20 uppercase">Your Score</span>
      </div>
      
      <!-- The score -->
      <div class="score-reveal">
        <div class="font-display font-black text-[200px] leading-none tracking-tighter text-white/90">
          73
        </div>
      </div>
      
    </div>
    
    <!-- Right side - Content -->
    <div class="w-1/2 min-h-screen flex flex-col justify-center pl-16 pr-12">
      
      <!-- Accent line -->
      <div class="accent-line h-[2px] w-32 mb-12 line-draw"></div>
      
      <!-- Status -->
      <div class="slide-in delay-1 mb-2">
        <span class="text-[#F43F5E] font-display font-bold text-sm uppercase tracking-[0.2em]">Sautéed</span>
      </div>
      
      <!-- Issue -->
      <h1 class="slide-in delay-2 font-display text-4xl font-bold leading-tight mb-8 max-w-md">
        Your rent is consuming 52% of your income.
      </h1>
      
      <!-- Context -->
      <p class="slide-in delay-2 text-white/40 text-lg mb-12 max-w-sm">
        That's 22 points above what's sustainable. It's the primary factor dragging your score down.
      </p>
      
      <!-- CTA -->
      <div class="slide-in delay-3">
        <button class="btn px-8 py-4 rounded-none font-display font-bold text-base">
          <span>Get the Full Report — $5</span>
        </button>
      </div>
      
    </div>
    
  </main>
  
  <!-- Bottom info -->
  <div class="fixed bottom-6 left-8 z-50">
    <span class="text-xs text-white/20">For entertainment only</span>
  </div>
  
  <div class="fixed bottom-6 right-8 z-50">
    <span class="text-xs text-white/30">1,203 checked today</span>
  </div>
  
</body>
</html>
