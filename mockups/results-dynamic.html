<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Am I Cooked? — Dynamic Colors</title>
  
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'General Sans', sans-serif; }
    .font-display { font-family: 'Satoshi', sans-serif; }
    body { background: #07070A; }
    
    .ring-container {
      position: relative;
      width: 200px;
      height: 200px;
    }
    .ring-container svg { transform: rotate(-90deg); }
    .ring-container circle { fill: none; stroke-linecap: round; }
    .ring-bg { stroke: rgba(255,255,255,0.04); stroke-width: 10; }
    .ring-progress { stroke-width: 10; stroke-dasharray: 502; }
    .ring-inner {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
    }
  </style>
</head>
<body class="text-white antialiased p-8">
  
  <header class="text-center mb-12">
    <h1 class="text-xl font-bold text-white/50 mb-2">Dynamic Colors Based on Score</h1>
    <p class="text-sm text-white/30">Each tier has its own color palette</p>
  </header>
  
  <div class="grid md:grid-cols-3 lg:grid-cols-6 gap-6 max-w-7xl mx-auto">
    
    <!-- RAW (0-15) - Cyan/Teal -->
    <div class="card rounded-2xl p-6 text-center">
      <div class="text-xs text-white/30 uppercase tracking-widest mb-4">Raw</div>
      <div class="ring-container mx-auto mb-4">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#06B6D4"/>
              <stop offset="100%" stop-color="#22D3EE"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="100" cy="100" r="80"/>
          <circle class="ring-progress" cx="100" cy="100" r="80" stroke="url(#grad1)" 
                  style="stroke-dashoffset: calc(502 - (502 * 12) / 100); filter: drop-shadow(0 0 8px rgba(6,182,212,0.5));"/>
        </svg>
        <div class="ring-inner">
          <span class="font-display font-black text-4xl" style="color: #22D3EE;">12</span>
        </div>
      </div>
      <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-bold uppercase"
           style="background: rgba(6,182,212,0.15); color: #22D3EE; border: 1px solid rgba(6,182,212,0.3);">
        🧊 Raw
      </div>
    </div>
    
    <!-- LIGHT SIZZLE (16-30) - Green -->
    <div class="card rounded-2xl p-6 text-center">
      <div class="text-xs text-white/30 uppercase tracking-widest mb-4">Light Sizzle</div>
      <div class="ring-container mx-auto mb-4">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#22C55E"/>
              <stop offset="100%" stop-color="#4ADE80"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="100" cy="100" r="80"/>
          <circle class="ring-progress" cx="100" cy="100" r="80" stroke="url(#grad2)"
                  style="stroke-dashoffset: calc(502 - (502 * 25) / 100); filter: drop-shadow(0 0 8px rgba(34,197,94,0.5));"/>
        </svg>
        <div class="ring-inner">
          <span class="font-display font-black text-4xl" style="color: #4ADE80;">25</span>
        </div>
      </div>
      <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-bold uppercase"
           style="background: rgba(34,197,94,0.15); color: #4ADE80; border: 1px solid rgba(34,197,94,0.3);">
        🍳 Light Sizzle
      </div>
    </div>
    
    <!-- SIMMERING (31-45) - Yellow -->
    <div class="card rounded-2xl p-6 text-center">
      <div class="text-xs text-white/30 uppercase tracking-widest mb-4">Simmering</div>
      <div class="ring-container mx-auto mb-4">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#EAB308"/>
              <stop offset="100%" stop-color="#FACC15"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="100" cy="100" r="80"/>
          <circle class="ring-progress" cx="100" cy="100" r="80" stroke="url(#grad3)"
                  style="stroke-dashoffset: calc(502 - (502 * 40) / 100); filter: drop-shadow(0 0 8px rgba(234,179,8,0.5));"/>
        </svg>
        <div class="ring-inner">
          <span class="font-display font-black text-4xl" style="color: #FACC15;">40</span>
        </div>
      </div>
      <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-bold uppercase"
           style="background: rgba(234,179,8,0.15); color: #FACC15; border: 1px solid rgba(234,179,8,0.3);">
        🥘 Simmering
      </div>
    </div>
    
    <!-- SAUTÉED (46-65) - Orange -->
    <div class="card rounded-2xl p-6 text-center">
      <div class="text-xs text-white/30 uppercase tracking-widest mb-4">Sautéed</div>
      <div class="ring-container mx-auto mb-4">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#F97316"/>
              <stop offset="100%" stop-color="#FB923C"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="100" cy="100" r="80"/>
          <circle class="ring-progress" cx="100" cy="100" r="80" stroke="url(#grad4)"
                  style="stroke-dashoffset: calc(502 - (502 * 55) / 100); filter: drop-shadow(0 0 8px rgba(249,115,22,0.5));"/>
        </svg>
        <div class="ring-inner">
          <span class="font-display font-black text-4xl" style="color: #FB923C;">55</span>
        </div>
      </div>
      <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-bold uppercase"
           style="background: rgba(249,115,22,0.15); color: #FB923C; border: 1px solid rgba(249,115,22,0.3);">
        🔥 Sautéed
      </div>
    </div>
    
    <!-- WELL DONE (66-85) - Red-Orange -->
    <div class="card rounded-2xl p-6 text-center">
      <div class="text-xs text-white/30 uppercase tracking-widest mb-4">Well Done</div>
      <div class="ring-container mx-auto mb-4">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#EF4444"/>
              <stop offset="100%" stop-color="#F87171"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="100" cy="100" r="80"/>
          <circle class="ring-progress" cx="100" cy="100" r="80" stroke="url(#grad5)"
                  style="stroke-dashoffset: calc(502 - (502 * 73) / 100); filter: drop-shadow(0 0 8px rgba(239,68,68,0.5));"/>
        </svg>
        <div class="ring-inner">
          <span class="font-display font-black text-4xl" style="color: #F87171;">73</span>
        </div>
      </div>
      <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-bold uppercase"
           style="background: rgba(239,68,68,0.15); color: #F87171; border: 1px solid rgba(239,68,68,0.3);">
        ☠️ Well Done
      </div>
    </div>
    
    <!-- CHARRED (86-100) - Dark Red/Maroon -->
    <div class="card rounded-2xl p-6 text-center">
      <div class="text-xs text-white/30 uppercase tracking-widest mb-4">Charred</div>
      <div class="ring-container mx-auto mb-4">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="grad6" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#991B1B"/>
              <stop offset="100%" stop-color="#B91C1C"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="100" cy="100" r="80"/>
          <circle class="ring-progress" cx="100" cy="100" r="80" stroke="url(#grad6)"
                  style="stroke-dashoffset: calc(502 - (502 * 92) / 100); filter: drop-shadow(0 0 8px rgba(153,27,27,0.5));"/>
        </svg>
        <div class="ring-inner">
          <span class="font-display font-black text-4xl" style="color: #B91C1C;">92</span>
        </div>
      </div>
      <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-bold uppercase"
           style="background: rgba(153,27,27,0.15); color: #DC2626; border: 1px solid rgba(153,27,27,0.3);">
        💀 Charred
      </div>
    </div>
    
  </div>
  
  <!-- Color Scale Reference -->
  <div class="max-w-3xl mx-auto mt-16">
    <h2 class="text-center text-sm text-white/30 uppercase tracking-widest mb-6">Color Scale</h2>
    <div class="h-3 rounded-full overflow-hidden" style="background: linear-gradient(90deg, #06B6D4 0%, #22C55E 20%, #EAB308 40%, #F97316 60%, #EF4444 80%, #991B1B 100%);"></div>
    <div class="flex justify-between mt-2 text-xs text-white/30">
      <span>0 - Raw</span>
      <span>100 - Charred</span>
    </div>
  </div>
  
  <footer class="text-center mt-16">
    <p class="text-white/20 text-sm">Ring + badge + all UI elements adapt to the score</p>
  </footer>
  
</body>
</html>
