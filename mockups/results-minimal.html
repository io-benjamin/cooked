<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Am I Cooked? — Results</title>
  
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'General Sans', sans-serif; }
    .font-display { font-family: 'Satoshi', sans-serif; }
    
    body {
      background: #0A0A0A;
      min-height: 100vh;
    }
    
    /* Animated gradient behind score */
    .score-container {
      position: relative;
    }
    
    .score-container::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(244,63,94,0.12) 0%, transparent 70%);
      animation: breathe 4s ease-in-out infinite;
    }
    
    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    }
    
    /* Score text */
    .score-text {
      background: linear-gradient(135deg, #F43F5E 0%, #FB7185 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Percentage symbol styling */
    .percent {
      font-size: 0.4em;
      opacity: 0.6;
      vertical-align: super;
      margin-left: -0.1em;
    }
    
    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .animate-fade { animation: fadeIn 0.6s ease forwards; }
    .animate-slide { animation: slideUp 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    .animate-scale { animation: scaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    
    .delay-1 { animation-delay: 0.1s; opacity: 0; }
    .delay-2 { animation-delay: 0.3s; opacity: 0; }
    .delay-3 { animation-delay: 0.5s; opacity: 0; }
    .delay-4 { animation-delay: 0.7s; opacity: 0; }
    
    /* Button */
    .btn-primary {
      background: linear-gradient(135deg, #F43F5E 0%, #E11D48 100%);
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(244, 63, 94, 0.35);
    }
    
    /* Top nav link */
    .nav-link {
      transition: all 0.2s ease;
    }
    .nav-link:hover {
      color: #fff;
    }
  </style>
</head>
<body class="text-white antialiased">
  
  <!-- Top Navigation -->
  <nav class="fixed top-0 left-0 right-0 z-50 px-6 py-5">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <a href="/" class="font-display font-bold text-sm text-white/60 hover:text-white transition-colors">
        ← Back
      </a>
      <button class="nav-link flex items-center gap-2 text-sm text-white/50 hover:text-white">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span class="font-medium">Sign up to save</span>
      </button>
    </div>
  </nav>
  
  <!-- Main Content -->
  <main class="min-h-screen flex flex-col items-center justify-center px-6 py-24">
    
    <div class="max-w-md w-full text-center">
      
      <!-- Score -->
      <div class="score-container mb-12 animate-scale delay-1">
        <div class="relative z-10 font-display font-black text-[180px] leading-none tracking-tighter score-text">
          73<span class="percent">%</span>
        </div>
        <div class="mt-2 text-white/30 text-lg font-medium tracking-wide">cooked</div>
      </div>
      
      <!-- Top Issue -->
      <div class="animate-slide delay-2 mb-16">
        <p class="text-white/40 text-sm uppercase tracking-widest mb-4">Your #1 Issue</p>
        <h1 class="font-display text-3xl font-bold leading-snug text-white">
          Rent is eating 52% of your income
        </h1>
      </div>
      
      <!-- CTA -->
      <div class="animate-slide delay-3">
        <button class="btn-primary w-full max-w-xs py-4 px-8 rounded-2xl font-display font-bold text-lg text-white">
          Get Full Report — $5
        </button>
        <p class="mt-4 text-white/20 text-sm">
          Detailed breakdown + personalized action plan
        </p>
      </div>
      
    </div>
    
  </main>
  
  <!-- Footer -->
  <footer class="fixed bottom-0 left-0 right-0 py-4 text-center">
    <p class="text-white/15 text-xs">For entertainment purposes only</p>
  </footer>
  
</body>
</html>
