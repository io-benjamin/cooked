<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Am I Cooked? — Modern Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    
    body {
      background: #000;
      min-height: 100vh;
    }
    
    /* Animated mesh gradient background */
    .mesh-bg {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(at 20% 20%, rgba(120, 40, 200, 0.15) 0%, transparent 50%),
        radial-gradient(at 80% 80%, rgba(255, 100, 50, 0.12) 0%, transparent 50%),
        radial-gradient(at 40% 80%, rgba(0, 150, 255, 0.08) 0%, transparent 50%);
      animation: meshMove 20s ease-in-out infinite;
    }
    
    @keyframes meshMove {
      0%, 100% { filter: hue-rotate(0deg); }
      50% { filter: hue-rotate(30deg); }
    }
    
    /* Subtle grain texture */
    .grain {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
    }
    
    /* Circular progress ring */
    .score-ring {
      transform: rotate(-90deg);
    }
    
    .score-ring circle {
      fill: none;
      stroke-width: 8;
      stroke-linecap: round;
    }
    
    .score-ring .bg {
      stroke: rgba(255,255,255,0.06);
    }
    
    .score-ring .progress {
      stroke: url(#scoreGradient);
      stroke-dasharray: 440;
      stroke-dashoffset: calc(440 - (440 * var(--score)) / 100);
      transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Glass card */
    .glass {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.06);
    }
    
    /* Subtle hover lift */
    .lift {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .lift:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    
    /* Metric bar */
    .metric-bar {
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    
    .metric-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Button glow */
    .btn-glow {
      position: relative;
      overflow: hidden;
    }
    
    .btn-glow::before {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(135deg, #ff6b35, #f97316, #ea580c);
      border-radius: inherit;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .btn-glow:hover::before {
      opacity: 1;
    }
    
    /* Fade in animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .fade-up {
      animation: fadeUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      opacity: 0;
    }
    
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }
  </style>
</head>
<body class="text-white antialiased">
  
  <div class="mesh-bg"></div>
  <div class="grain"></div>
  
  <main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-4 py-12">
    
    <!-- Score Circle -->
    <div class="fade-up delay-1 relative mb-8">
      <svg class="score-ring w-48 h-48" viewBox="0 0 160 160" style="--score: 73">
        <defs>
          <linearGradient id="scoreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f97316" />
            <stop offset="100%" stop-color="#ea580c" />
          </linearGradient>
        </defs>
        <circle class="bg" cx="80" cy="80" r="70" />
        <circle class="progress" cx="80" cy="80" r="70" />
      </svg>
      
      <!-- Score number in center -->
      <div class="absolute inset-0 flex flex-col items-center justify-center">
        <span class="text-6xl font-bold tracking-tight">73</span>
        <span class="text-sm text-white/40 font-medium tracking-wide uppercase">cooked</span>
      </div>
    </div>
    
    <!-- Tier Badge -->
    <div class="fade-up delay-2 flex items-center gap-2 px-4 py-2 rounded-full glass mb-6">
      <span class="w-2 h-2 rounded-full bg-orange-500"></span>
      <span class="text-sm font-medium text-white/70">Sautéed</span>
    </div>
    
    <!-- One-liner insight -->
    <p class="fade-up delay-2 text-lg text-white/50 text-center max-w-sm mb-10 leading-relaxed">
      Your rent is taking <span class="text-white font-medium">52%</span> of your income.
      <br/>That's the main problem.
    </p>
    
    <!-- Primary CTA -->
    <button class="fade-up delay-3 btn-glow w-full max-w-xs py-4 px-6 bg-gradient-to-r from-orange-500 to-orange-600 rounded-2xl font-semibold text-base transition-all hover:scale-[1.02] mb-4">
      Unlock Full Analysis — $5
    </button>
    
    <!-- Secondary CTA -->
    <button class="fade-up delay-3 w-full max-w-xs py-3 px-6 glass rounded-xl font-medium text-white/60 hover:text-white hover:bg-white/[0.06] transition-all flex items-center justify-center gap-2">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Save with Google
    </button>
    
    <!-- Divider -->
    <div class="w-full max-w-xs border-t border-white/[0.06] my-10"></div>
    
    <!-- Quick Stats Grid -->
    <div class="fade-up delay-4 grid grid-cols-3 gap-3 w-full max-w-sm mb-8">
      <div class="glass rounded-2xl p-4 text-center lift">
        <div class="text-2xl font-semibold text-red-400">52%</div>
        <div class="text-[11px] text-white/30 font-medium uppercase tracking-wide mt-1">Rent</div>
        <div class="metric-bar mt-2">
          <div class="metric-fill bg-red-500" style="width: 52%"></div>
        </div>
      </div>
      <div class="glass rounded-2xl p-4 text-center lift">
        <div class="text-2xl font-semibold text-yellow-400">38%</div>
        <div class="text-[11px] text-white/30 font-medium uppercase tracking-wide mt-1">DTI</div>
        <div class="metric-bar mt-2">
          <div class="metric-fill bg-yellow-500" style="width: 38%"></div>
        </div>
      </div>
      <div class="glass rounded-2xl p-4 text-center lift">
        <div class="text-2xl font-semibold text-green-400">8%</div>
        <div class="text-[11px] text-white/30 font-medium uppercase tracking-wide mt-1">Savings</div>
        <div class="metric-bar mt-2">
          <div class="metric-fill bg-green-500" style="width: 8%"></div>
        </div>
      </div>
    </div>
    
    <!-- Comparison -->
    <div class="fade-up delay-5 glass rounded-2xl p-5 w-full max-w-sm lift">
      <div class="flex items-center justify-between mb-4">
        <span class="text-xs text-white/30 font-medium uppercase tracking-wide">vs Austin average</span>
        <span class="text-xs text-white/40">1,203 people</span>
      </div>
      <div class="flex items-end gap-4">
        <div class="flex-1">
          <div class="flex items-end gap-2 mb-2">
            <div class="w-12 bg-gradient-to-t from-orange-600 to-orange-400 rounded-t-lg" style="height: 73px"></div>
            <div class="w-12 bg-white/10 rounded-t-lg" style="height: 58px"></div>
          </div>
          <div class="flex gap-2 text-[11px] text-white/40">
            <span class="w-12 text-center">You</span>
            <span class="w-12 text-center">Avg</span>
          </div>
        </div>
        <div class="text-right">
          <div class="text-3xl font-bold">73<span class="text-white/30 text-lg">%</span></div>
          <div class="text-xs text-white/40">worse than 67%</div>
        </div>
      </div>
    </div>
    
    <!-- Leaderboard Link -->
    <a href="#" class="fade-up delay-5 mt-6 flex items-center gap-2 text-sm text-white/40 hover:text-white/70 transition-colors">
      <span>#847 on leaderboard</span>
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    </a>
    
  </main>
  
  <!-- Footer -->
  <footer class="relative z-10 py-6 text-center">
    <p class="text-xs text-white/20">For entertainment only. Not financial advice.</p>
  </footer>
  
</body>
</html>
