<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Am I Cooked? — Results</title>
  
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'General Sans', sans-serif; }
    .font-display { font-family: 'Satoshi', sans-serif; }
    
    body { background: #08080A; }
    
    /* Score circle */
    .score-ring {
      position: relative;
      width: 280px;
      height: 280px;
    }
    
    .score-ring svg {
      transform: rotate(-90deg);
    }
    
    .score-ring circle {
      fill: none;
      stroke-width: 8;
      stroke-linecap: round;
    }
    
    .score-ring .bg {
      stroke: rgba(255,255,255,0.06);
    }
    
    .score-ring .progress {
      stroke: url(#scoreGradient);
      stroke-dasharray: 754;
      stroke-dashoffset: calc(754 - (754 * 73) / 100);
      animation: fillRing 1.5s ease-out forwards;
    }
    
    @keyframes fillRing {
      from { stroke-dashoffset: 754; }
    }
    
    .score-value {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    /* Tier pills */
    .tier-track {
      display: flex;
      gap: 4px;
    }
    
    .tier-pill {
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.3);
      transition: all 0.3s ease;
    }
    
    .tier-pill.active {
      background: linear-gradient(135deg, rgba(249,115,22,0.2), rgba(239,68,68,0.2));
      color: #FB923C;
      border: 1px solid rgba(249,115,22,0.3);
    }
    
    /* Issue highlight */
    .issue-stat {
      color: #F43F5E;
      font-weight: 700;
    }
    
    /* Button */
    .btn-primary {
      background: linear-gradient(135deg, #E11D48 0%, #BE123C 100%);
      transition: all 0.3s ease;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(225,29,72,0.25);
    }
    
    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate { animation: fadeUp 0.6s ease forwards; opacity: 0; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.3s; }
    .delay-3 { animation-delay: 0.5s; }
    .delay-4 { animation-delay: 0.7s; }
    .delay-5 { animation-delay: 0.9s; }
  </style>
</head>
<body class="text-white antialiased min-h-screen">
  
  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 z-50 px-6 py-5">
    <div class="max-w-lg mx-auto flex items-center justify-between">
      <a href="/" class="font-display font-bold text-white/40 hover:text-white/70 transition-colors text-sm">
        ← Back
      </a>
      <button class="text-sm text-white/40 hover:text-white transition-colors">
        Save →
      </button>
    </div>
  </header>
  
  <!-- Main -->
  <main class="min-h-screen flex flex-col items-center justify-center px-6 py-20">
    
    <div class="max-w-lg w-full">
      
      <!-- Score Ring -->
      <div class="animate delay-1 flex justify-center mb-8">
        <div class="score-ring">
          <svg width="280" height="280" viewBox="0 0 280 280">
            <defs>
              <linearGradient id="scoreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#F97316" />
                <stop offset="100%" stop-color="#EF4444" />
              </linearGradient>
            </defs>
            <circle class="bg" cx="140" cy="140" r="120" />
            <circle class="progress" cx="140" cy="140" r="120" />
          </svg>
          <div class="score-value">
            <span class="font-display font-black text-7xl">73</span>
            <span class="text-white/40 text-sm font-medium mt-1">out of 100</span>
          </div>
        </div>
      </div>
      
      <!-- Tier Track -->
      <div class="animate delay-2 flex justify-center mb-10">
        <div class="tier-track">
          <div class="tier-pill">Raw</div>
          <div class="tier-pill">Sizzle</div>
          <div class="tier-pill">Simmer</div>
          <div class="tier-pill active">Sautéed</div>
          <div class="tier-pill">Well Done</div>
          <div class="tier-pill">Charred</div>
        </div>
      </div>
      
      <!-- Divider -->
      <div class="animate delay-3 border-t border-white/[0.06] mb-8"></div>
      
      <!-- Issue -->
      <div class="animate delay-3 text-center mb-10 px-4">
        <p class="text-xs text-white/30 uppercase tracking-widest mb-3">What's cooking you</p>
        <h1 class="font-display text-2xl font-bold leading-relaxed">
          You're spending <span class="issue-stat">52%</span> of your income on rent — that's <span class="issue-stat">22%</span> over the safe limit.
        </h1>
      </div>
      
      <!-- CTA -->
      <div class="animate delay-4 text-center">
        <button class="btn-primary w-full max-w-sm py-4 rounded-2xl font-display font-bold text-base">
          Get Full Report — $5
        </button>
        <p class="mt-4 text-white/20 text-xs">
          Detailed breakdown • Personalized plan • Peer comparison
        </p>
      </div>
      
    </div>
    
  </main>
  
  <!-- Footer -->
  <footer class="fixed bottom-4 left-0 right-0">
    <p class="text-center text-[10px] text-white/15">For entertainment purposes only</p>
  </footer>
  
</body>
</html>
