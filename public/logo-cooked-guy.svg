<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Flames behind head -->
  <g class="flames">
    <!-- Left flame -->
    <path d="M20 45 Q15 25 25 15 Q30 25 28 35 Q35 20 32 40 Q25 50 20 45" fill="#FF6B35"/>
    <path d="M22 42 Q18 28 26 20 Q29 28 27 35 Q32 25 30 38 Q25 45 22 42" fill="#FFD93D"/>
    
    <!-- Right flame -->
    <path d="M80 45 Q85 25 75 15 Q70 25 72 35 Q65 20 68 40 Q75 50 80 45" fill="#FF6B35"/>
    <path d="M78 42 Q82 28 74 20 Q71 28 73 35 Q68 25 70 38 Q75 45 78 42" fill="#FFD93D"/>
    
    <!-- Top flame -->
    <path d="M50 20 Q40 5 50 -5 Q55 8 52 15 Q60 0 58 12 Q65 -5 60 15 Q55 25 50 20" fill="#FF6B35"/>
    <path d="M50 18 Q43 8 50 0 Q54 10 52 14 Q58 5 56 12 Q52 20 50 18" fill="#FFD93D"/>
  </g>
  
  <!-- Head -->
  <circle cx="50" cy="55" r="35" fill="#FFE66D"/>
  <circle cx="50" cy="55" r="35" fill="none" stroke="#2D2D2D" stroke-width="2.5"/>
  
  <!-- Sweat drops -->
  <ellipse cx="22" cy="45" rx="3" ry="5" fill="#87CEEB"/>
  <ellipse cx="78" cy="50" rx="2.5" ry="4" fill="#87CEEB"/>
  
  <!-- Left eye - spiral/dizzy -->
  <circle cx="38" cy="50" r="8" fill="white" stroke="#2D2D2D" stroke-width="2"/>
  <path d="M38 50 m-5 0 a5 5 0 1 1 5 -5 a3 3 0 1 1 -3 3" fill="none" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Right eye - spiral/dizzy -->
  <circle cx="62" cy="50" r="8" fill="white" stroke="#2D2D2D" stroke-width="2"/>
  <path d="M62 50 m-5 0 a5 5 0 1 1 5 -5 a3 3 0 1 1 -3 3" fill="none" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Eyebrows - worried -->
  <path d="M30 38 Q35 35 42 40" fill="none" stroke="#2D2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M58 40 Q65 35 70 38" fill="none" stroke="#2D2D2D" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Mouth - wavy/stressed -->
  <path d="M38 72 Q44 68 50 72 Q56 76 62 72" fill="none" stroke="#2D2D2D" stroke-width="2.5" stroke-linecap="round"/>
</svg>